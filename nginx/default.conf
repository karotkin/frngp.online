server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- закрытая зона: HTTP Basic Auth на весь сайт и API ---
    auth_basic           "frngp.online — закрытая зона";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # .jsx грузятся через <script type="text/babel" src> — отдаём как js,
    # иначе часть браузеров режет octet-stream
    location ~ \.jsx$ {
        types { }
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # динамический курс валют -> backend rate-api
    location /api/ {
        proxy_pass http://rate-api:8080/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ассеты с обычным кэшем
    location ~* \.(png|jpg|jpeg|gif|svg|css|woff2?)$ {
        expires 7d;
        access_log off;
    }
}
