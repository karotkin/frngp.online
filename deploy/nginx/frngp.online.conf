# Копия vhost для общего nginx-proxy на сервере.
# Боевой путь: /opt/docker/common/nginx/conf.d/frngp.online.conf
# Проксирует на контейнер frngp-web (сеть proxy). TLS — Let's Encrypt (certbot).
server {
    listen 80;
    server_name frngp.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://frngp.online$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name frngp.online;

    ssl_certificate     /etc/letsencrypt/live/frngp.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/frngp.online/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        resolver       127.0.0.11 valid=10s;
        set $upstream  frngp-web;
        proxy_pass         http://$upstream:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
