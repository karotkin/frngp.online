# Серверный стек за общим nginx-proxy (+ certbot).
# Порты наружу НЕ публикуются: web доступен общему прокси по имени
# frngp-web в сети proxy; db и rate-api — только во внутренней сети.
# Запуск:  docker compose -f docker-compose.server.yml up -d --build
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: frngp-web:local
    container_name: frngp-web
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?задайте BASIC_AUTH_USER в .env}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:?задайте BASIC_AUTH_PASS в .env}
    networks:
      - proxy
      - internal
    depends_on:
      db:
        condition: service_healthy
      rate-api:
        condition: service_started

  rate-api:
    build:
      context: ./rate-api
      dockerfile: Dockerfile
    image: frngp-rate-api:local
    container_name: frngp-rate-api
    restart: unless-stopped
    environment:
      RATE_TTL_MIN: ${RATE_TTL_MIN:-30}
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-frngp}
      PGPASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
      PGDATABASE: ${POSTGRES_DB:-frngp}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: frngp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-frngp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-frngp}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frngp} -d ${POSTGRES_DB:-frngp}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  proxy:
    external: true       # общая сеть существующего nginx-proxy
  internal:
    driver: bridge

volumes:
  # external: данные БД живут вне жизненного цикла compose-проекта —
  # их не удалит ни `down -v`, ни переименование папки/проекта.
  # Создать один раз: docker volume create frngp_pgdata
  pgdata:
    external: true
    name: frngp_pgdata
